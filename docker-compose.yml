services:
  postgres:
    image: postgres:16-alpine
    container_name: url_shortener_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    container_name: url_shortener_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: url_shortener_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  redis-commander:
      image: rediscommander/redis-commander:latest
      container_name: url_shortener_redis_commander
      environment:
        - REDIS_HOSTS=local:redis:6379
      ports:
        - "8081:8081"
      depends_on:
        - redis
volumes:
  postgres_data:
  redis_data:
